name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Cache Mint packages
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: mint-${{ hashFiles('Mintfile') }}

      - name: Install Mint & tools
        run: |
          brew install mint
          mint bootstrap

      - name: Generate Xcode project
        run: mint run xcodegen generate

      - name: Archive
        run: |
          xcodebuild archive \
            -project Hatoko.xcodeproj \
            -scheme Hatoko \
            -configuration Release \
            -archivePath build/Hatoko.xcarchive \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Prepare artifact
        run: |
          APP_PATH="build/Hatoko.xcarchive/Products/Applications/Hatoko.app"
          ditto -c -k --keepParent "$APP_PATH" Hatoko.app.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            Hatoko.app.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes
